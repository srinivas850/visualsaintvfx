<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Saint VFX | Client Gallery</title>
    <script>
        // Ensure trailing slash so relative paths (css/client.css) resolve correctly
        if (window.location.protocol.startsWith('http') && !window.location.pathname.endsWith('/') && !window.location.pathname.endsWith('.html')) {
            window.location.replace(window.location.href.split('?')[0] + '/' + window.location.search + window.location.hash);
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/client.css">
</head>
<body>
    <div id="toast-container"></div>

    <!-- Gallery Section -->
    <section id="gallery-section" class="active">
        <nav class="gallery-nav glass-nav">
            <div class="nav-brand">
                <h2>VS</h2>
                <span id="welcome-name">Gallery</span>
            </div>
            <div class="nav-actions">
                <button id="download-all-btn" class="btn btn-outline">Download All</button>
                <button id="logout-btn" class="btn btn-text">Logout</button>
            </div>
        </nav>

        <header class="gallery-hero">
            <h1 id="gallery-title">Your Collection</h1>
            <p>A cinematic curation of your timeless moments</p>
        </header>

        <main class="gallery-container">
            <div class="grid-controls">
                <span id="file-count">0 items</span>
                <div class="view-toggles">
                    <!-- Future feature: Grid / List view toggle -->
                </div>
            </div>

            <div class="media-grid" id="media-grid">
                <!-- Media items populated by JS -->
            </div>
            
            <div id="empty-state" class="hidden">
                <p>No media files found in your gallery yet.</p>
            </div>
        </main>

        <footer class="gallery-footer">
            <p>&copy; 2026 Visual Saint VFX. All rights reserved.</p>
        </footer>
    </section>

    <!-- Lightbox for viewing images -->
    <div id="lightbox" class="lightbox hidden">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" class="hidden">
            <video id="lightbox-video" controls class="hidden"></video>
        </div>
        <div class="lightbox-controls">
            <button id="lightbox-download" class="btn btn-primary">Download</button>
        </div>
    </div>

    <script src="js/client.js"></script>
</body>
</html>
